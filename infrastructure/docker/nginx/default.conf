server {
  listen 80;

  # Placeholder routing.
  # Replace upstream targets based on your final dev/prod build strategy.
  location / {
    proxy_pass http://frontend:5173;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # API routing
  location /api/ {
    proxy_pass http://backend:9000;
    proxy_set_header Host $host;
  }

  # Python AI routing
  location /ai/ {
    proxy_pass http://python-ai:8000;
    proxy_set_header Host $host;
  }
}

