services:
  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - python-ai

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]

  backend:
    image: php:8.4-fpm
    working_dir: /var/www/html
    volumes:
      - ./apps/backend/laravel-api:/var/www/html
    environment:
      - APP_ENV=local
    depends_on:
      - mysql
      - redis

  python-ai:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./apps/backend/python-ai:/app
    command: ["sh", "-c", "pip install -r requirements.txt && uvicorn app.api.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      - redis

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=cyberiumshield
      - MYSQL_USER=cyberiumshield
      - MYSQL_PASSWORD=cyberiumshield
      - MYSQL_ROOT_PASSWORD=cyberiumshield_root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:

